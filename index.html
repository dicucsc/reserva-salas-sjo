<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva de Salas – SJO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Pantalla de Login -->
  <div id="login-screen" class="d-flex align-items-center justify-content-center" style="min-height:100vh">
    <div class="card" style="width:400px; max-width:95%">
      <div class="card-body">
        <h4 class="card-title text-center mb-1">Reserva de Salas</h4>
        <p class="text-muted text-center mb-4" style="font-size:0.8125rem">Ingresa con tu correo institucional</p>
        <div class="mb-3">
          <label class="form-label" for="login-email">Correo electrónico</label>
          <input type="email" class="form-control" id="login-email" placeholder="tu@institucion.edu" autofocus>
        </div>
        <div id="login-error" class="alert alert-danger py-2 d-none"></div>
        <button id="btn-login" class="btn btn-primary w-100">Ingresar</button>
      </div>
    </div>
  </div>

  <!-- App Principal -->
  <div id="app-container" class="d-none">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Salas SJO</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#" data-nav="calendario">Calendario</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" data-nav="mis-reservas">Mis Reservas</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span class="navbar-text" id="user-display"></span>
            <button id="btn-logout" class="btn btn-outline-light btn-sm">Salir</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-3">
      <!-- Vista Calendario -->
      <section id="view-calendario" class="view-section">
        <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
          <div class="date-nav">
            <button id="btn-prev" class="btn btn-outline-secondary btn-sm">&larr;</button>
            <button id="btn-today" class="btn btn-outline-primary btn-sm">Esta semana</button>
            <button id="btn-next" class="btn btn-outline-secondary btn-sm">&rarr;</button>
            <input type="date" id="date-picker" class="form-control form-control-sm" style="width:150px">
            <h5 id="current-date" class="mb-0">Cargando...</h5>
          </div>
        </div>

        <div class="legend-bar">
          <span><span class="legend-dot" style="background:var(--color-free-accent)"></span>Libre</span>
          <span><span class="legend-dot" style="background:var(--color-occupied-accent)"></span>Ocupado</span>
          <span><span class="legend-dot" style="background:var(--color-mine-accent)"></span>Mi reserva</span>
          <span class="legend-hint">Click = seleccionar | Shift+click = rango</span>
        </div>

        <!-- Barra de selección para reservar -->
        <div id="selection-bar" class="selection-bar d-none">
          <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <span id="sel-info"></span>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="btn btn-sm btn-outline-secondary" onclick="Calendar.clearSelection()">Limpiar</button>
              <button class="btn btn-sm btn-outline-primary" id="btn-recurrence" onclick="Calendar.toggleRecurrence()">Repetir semanal</button>
              <span id="recurrence-options" class="d-none d-flex gap-2 align-items-center">
                <label class="mb-0 small">hasta:</label>
                <input type="date" id="recurrence-until" class="form-control form-control-sm" style="width:150px">
                <button class="btn btn-sm btn-primary" onclick="Calendar.applyRecurrence()">Aplicar</button>
              </span>
              <button class="btn btn-sm btn-success" onclick="Calendar.openSelectionReservation()">Reservar bloques seleccionados</button>
            </div>
          </div>
        </div>

        <!-- Barra de selección para cancelar -->
        <div id="cancel-selection-bar" class="cancel-selection-bar d-none">
          <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <span id="cancel-sel-info"></span>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary" onclick="Calendar.clearCancelSelection()">Limpiar</button>
              <button class="btn btn-sm btn-danger" onclick="App.openBulkCancel()">Cancelar reservas seleccionadas</button>
            </div>
          </div>
        </div>

        <div id="calendar-grid">
          <div class="text-center py-5">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2 text-muted" style="font-size:0.8125rem">Cargando datos...</p>
          </div>
        </div>
      </section>

      <!-- Vista Mis Reservas -->
      <section id="view-mis-reservas" class="view-section d-none">
        <h4 class="mb-3">Mis Reservas <small id="my-email-display"></small></h4>
        <div id="my-reservations-list"></div>
      </section>
    </div>
  </div>

  <!-- Modal de Reserva -->
  <div class="modal fade" id="reservationModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nueva Reserva</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-light mb-3">
            <div id="res-slots-info"></div>
            <hr class="my-2">
            <strong>Usuario:</strong> <span id="res-user-info"></span>
          </div>
          <div class="mb-3">
            <label class="form-label">Actividad / Motivo</label>
            <input type="text" class="form-control" id="res-actividad" placeholder="Ej: Reunión, Taller de capacitación...">
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="res-recurrence-check" onchange="App.toggleResRecurrence()">
              <label class="form-check-label" for="res-recurrence-check">
                Repetir semanalmente (mismo día y hora)
              </label>
            </div>
            <div id="res-recurrence-options" class="d-none mt-2 d-flex gap-2 align-items-center">
              <label class="mb-0 small">Repetir hasta:</label>
              <input type="date" id="res-recurrence-until" class="form-control form-control-sm" style="width:180px">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button id="btn-res-confirm" class="btn btn-success" onclick="App.confirmReservation()">
            Confirmar Reserva
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Cancelar Reserva -->
  <div class="modal fade" id="cancelModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-warning-subtle">
          <h5 class="modal-title">Cancelar Reserva</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="cancel-modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Volver</button>
          <button id="btn-cancel-confirm" class="btn btn-danger" onclick="App.confirmCancel()">
            Confirmar Cancelación
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
